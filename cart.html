<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>
</head>
<body>

<h2>Your Cart</h2>
<div id="cart-items"></div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let container = document.getElementById("cart-items");

cart.forEach(item => {
    container.innerHTML += `<p>${item.name} - ₹${item.price}</p>`;
});
</script>

</body>
</html>
